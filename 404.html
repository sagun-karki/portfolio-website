<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Data Not Found</title>
    <!-- Critical CSS for instant render -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Courier New',monospace;background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;color:#e0e0e0}
        .container{text-align:center;position:relative;z-index:10;padding:0 1rem}
        h1{font-size:clamp(4rem,15vw,8rem);font-weight:bold;background:linear-gradient(90deg,#00d9ff,#00ff88,#00d9ff);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 3s ease infinite;margin-bottom:20px}
        @keyframes gradientShift{0%,100%{background-position:0% center}50%{background-position:200% center}}
        .subtitle{font-size:clamp(1rem,3vw,1.5rem);color:#8892b0;margin-bottom:40px;letter-spacing:2px}
        .message{font-size:clamp(0.9rem,2.5vw,1rem);color:#64ffda;margin-bottom:30px;max-width:500px;line-height:1.6}
        .home-btn{display:inline-block;padding:12px 30px;border:2px solid #64ffda;color:#64ffda;text-decoration:none;border-radius:5px;transition:all 0.3s ease;font-size:1rem;text-transform:uppercase;letter-spacing:1px}
        .home-btn:hover{background:#64ffda;color:#0f0f1a;box-shadow:0 0 20px rgba(100,255,218,0.5)}
        .grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;opacity:0.1}
        .data-point{position:absolute;width:8px;height:8px;background:#64ffda;border-radius:50%;opacity:0.6;animation:float 6s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg);opacity:0.6}50%{transform:translateY(-20px) rotate(180deg);opacity:0.3}}
        .code-snippet{position:fixed;bottom:30px;right:30px;font-size:0.7rem;color:#8892b0;opacity:0.5;text-align:right;z-index:1}
        .svg-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        .chart-line{stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawLine 3s ease-out forwards}
        @keyframes drawLine{to{stroke-dashoffset:0}}
        .node{animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
        .node:nth-child(2){animation-delay:0.5s}.node:nth-child(3){animation-delay:1s}.node:nth-child(4){animation-delay:1.5s}.node:nth-child(5){animation-delay:2s}
        .scan-line{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#64ffda,transparent);animation:scan 4s linear infinite;z-index:2;opacity:0.3}
        @keyframes scan{0%{top:0%}100%{top:100%}}
        @media(max-width:767px){.code-snippet{display:none}.container{padding:0 1.5rem}.home-btn{padding:10px 20px;font-size:0.9rem}}
        @media(max-width:375px){h1{font-size:4rem}.subtitle{font-size:1rem}.message{font-size:0.85rem}}
        @media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
    </style>
</head>
<body>
    <!-- Background Grid SVG -->
    <svg class="grid-bg" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
                <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#64ffda" stroke-width="0.5"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
    </svg>

    <!-- Animated Data Visualization SVG -->
    <svg class="svg-container" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800">
        <!-- Animated neural network nodes -->
        <circle class="node" cx="200" cy="150" r="4" fill="#64ffda"/>
        <circle class="node" cx="400" cy="250" r="4" fill="#00d9ff"/>
        <circle class="node" cx="600" cy="180" r="4" fill="#00ff88"/>
        <circle class="node" cx="800" cy="300" r="4" fill="#64ffda"/>
        <circle class="node" cx="1000" cy="200" r="4" fill="#00d9ff"/>
        <circle class="node" cx="1200" cy="150" r="4" fill="#00ff88"/>
        
        <!-- Connection lines -->
        <line x1="200" y1="150" x2="400" y2="250" stroke="#64ffda" stroke-width="1" opacity="0.3"/>
        <line x1="400" y1="250" x2="600" y2="180" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
        <line x1="600" y1="180" x2="800" y2="300" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
        <line x1="800" y1="300" x2="1000" y2="200" stroke="#64ffda" stroke-width="1" opacity="0.3"/>
        <line x1="1000" y1="200" x2="1200" y2="150" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>

        <!-- Animated chart -->
        <path class="chart-line" d="M 0 600 Q 200 550 400 580 T 800 520 T 1200 560 T 1440 540" 
              fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.5"/>
        
        <path class="chart-line" d="M 0 650 Q 300 600 500 630 T 900 590 T 1300 620 T 1440 600" 
              fill="none" stroke="#00ff88" stroke-width="2" opacity="0.4" style="animation-delay: 1s;"/>

        <!-- Scatter plot points -->
        <circle cx="300" cy="400" r="3" fill="#64ffda" opacity="0.6">
            <animate attributeName="cy" values="400;380;400" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="500" cy="450" r="3" fill="#00d9ff" opacity="0.6">
            <animate attributeName="cy" values="450;430;450" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="700" cy="420" r="3" fill="#00ff88" opacity="0.6">
            <animate attributeName="cy" values="420;400;420" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="900" cy="480" r="3" fill="#64ffda" opacity="0.6">
            <animate attributeName="cy" values="480;460;480" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="1100" cy="440" r="3" fill="#00d9ff" opacity="0.6">
            <animate attributeName="cy" values="440;420;440" dur="3.8s" repeatCount="indefinite"/>
        </circle>

        <!-- Binary code rain effect (simplified) -->
        <text x="100" y="100" fill="#64ffda" font-size="12" opacity="0.2" font-family="monospace">01001000</text>
        <text x="150" y="120" fill="#00d9ff" font-size="12" opacity="0.2" font-family="monospace">01100101</text>
        <text x="200" y="140" fill="#00ff88" font-size="12" opacity="0.2" font-family="monospace">01101100</text>
        <text x="1300" y="200" fill="#64ffda" font-size="12" opacity="0.2" font-family="monospace">01101100</text>
        <text x="1250" y="220" fill="#00d9ff" font-size="12" opacity="0.2" font-family="monospace">01101111</text>
        <text x="1200" y="240" fill="#00ff88" font-size="12" opacity="0.2" font-family="monospace">01110111</text>
    </svg>

    <!-- Scanning line -->
    <div class="scan-line"></div>

    <!-- Main Content -->
    <div class="container">
        <h1>404</h1>
        <p class="subtitle">DATA NOT FOUND</p>
        <p class="message">
            The dataset you're looking for doesn't exist in our database.<br>
            Like a null value in an empty table, this page returned no results.
        </p>
        <a href="/" class="home-btn">Return to Base</a>
    </div>

    <!-- Decorative code snippet -->
    <div class="code-snippet">
        if (page.exists() === false) {<br>
        &nbsp;&nbsp;return error404();<br>
        }<br>
        // Status: NULL
    </div>

    <script>
        // Create floating data points
        function createDataPoints() {
            const container = document.querySelector('.container');
            const colors = ['#64ffda', '#00d9ff', '#00ff88'];
            
            for (let i = 0; i < 15; i++) {
                const point = document.createElement('div');
                point.className = 'data-point';
                point.style.left = Math.random() * 100 + '%';
                point.style.top = Math.random() * 100 + '%';
                point.style.background = colors[Math.floor(Math.random() * colors.length)];
                point.style.animationDelay = Math.random() * 3 + 's';
                point.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.body.appendChild(point);
            }
        }

        createDataPoints();
    </script>
</body>
</html>
