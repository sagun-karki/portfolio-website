<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sagun Karki{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon/favicon.ico') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <script type="module" src="https://unpkg.com/@material/web/all.js?module"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (theme === 'dark' || (!theme && prefersDark)) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KQGJ05YPPF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', 'G-KQGJ05YPPF');
  </script>
</head>

<body>

  <div id="tsparticles"></div>

  <header class="main-header">
    <nav class="main-nav">
      <a href="#" class="nav-brand">Sagun Karki</a>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
      </div>
      <div class="nav-actions">
        <md-icon-button id="theme-toggle" class="theme-toggle">
          <md-icon>dark_mode</md-icon>
        </md-icon-button>
        <md-icon-button class="hamburger-button">
          <md-icon>menu</md-icon>
        </md-icon-button>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <p>&copy; 2025 Sagun Karki. All rights reserved.</p>
      <div class="social-links">
        <a href="https://www.linkedin.com/in/sagunkarki/" target="_blank" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
            </svg>
        </a>
        <a href="https://github.com/sagun-karki" target="_blank" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
            </svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

  <script>
    // --- ELEMENT SELECTORS ---
    const hamburgerButton = document.querySelector('.hamburger-button');
    const navLinks = document.querySelector('.nav-links');
    const header = document.querySelector('.main-header');
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = themeToggle.querySelector('md-icon');
    const docElement = document.documentElement;
    const particlesContainer = document.getElementById('tsparticles');
    const heroSection = document.querySelector('.hero');
    // --- RESPONSIVE NAVIGATION ---
    hamburgerButton.addEventListener('click', () => {
      navLinks.classList.toggle('is-open');
    });
    // --- STICKY HEADER ---
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 50);
    });
    // --- PARTICLE CONFIGURATIONS ---
    const baseParticlesConfig = {
      fpsLimit: 120,
      interactivity: {
        events: {
          onHover: {
            enable: true,
            mode: "grab"
          },
          resize: true
        },
        modes: {
          grab: {
            distance: 140,
            links: {
              opacity: 1
            }
          }
        },
      },
      particles: {
        number: {
          value: 60,
          density: {
            enable: true,
            value_area: 800
          }
        },
        color: {
          value: "#ffffff"
        },
        shape: {
          type: "circle"
        },
        opacity: {
          value: 0.5,
          random: false
        },
        size: {
          value: 3,
          random: true
        },
        links: {
          enable: true,
          distance: 150,
          color: "#ffffff",
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 1,
          direction: "none",
          random: false,
          straight: false,
          out_mode: "out",
          bounce: false
        },
      },
      detectRetina: true,
    };
    // Light mode config (reverted to the more visible version)
    const lightParticlesConfig = {
      ...baseParticlesConfig,
      particles: {
        ...baseParticlesConfig.particles,
        color: {
          value: "#5a6474"
        },
        links: {
          ...baseParticlesConfig.particles.links,
          color: "#dfe3e8"
        },
      }
    };
    const darkParticlesConfig = {
      ...baseParticlesConfig,
      particles: {
        ...baseParticlesConfig.particles,
        color: {
          value: "#a8b2c1"
        },
        links: {
          ...baseParticlesConfig.particles.links,
          color: "#333333"
        },
      }
    };
    // --- THEME & PARTICLE VISIBILITY LOGIC ---
    function loadParticlesTheme() {
      const isDarkMode = docElement.classList.contains('dark-theme');
      tsParticles.load("tsparticles", isDarkMode ? darkParticlesConfig : lightParticlesConfig);
    }

    function updateThemeIcon() {
      themeIcon.textContent = docElement.classList.contains('dark-theme') ? 'light_mode' : 'dark_mode';
    }
    // NEW: Conditionally show/hide particles based on scroll and theme
    function handleParticleVisibility() {
      const isLightMode = !docElement.classList.contains('dark-theme');
      if (isLightMode) {
        // In light mode, hide particles after scrolling past the hero section
        const heroHeight = heroSection ? heroSection.offsetHeight : 0;
        const scrollPosition = window.scrollY;
        particlesContainer.classList.toggle('is-hidden', scrollPosition > heroHeight - header.offsetHeight);
      } else {
        // In dark mode, always show particles
        particlesContainer.classList.remove('is-hidden');
      }
    }
    // --- EVENT LISTENERS ---
    themeToggle.addEventListener('click', () => {
      const isCurrentlyDark = docElement.classList.toggle('dark-theme');
      localStorage.setItem('theme', isCurrentlyDark ? 'dark' : 'light');
      updateThemeIcon();
      loadParticlesTheme();
      handleParticleVisibility(); // Check visibility on theme change
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        docElement.classList.toggle('dark-theme', e.matches);
        updateThemeIcon();
        loadParticlesTheme();
        handleParticleVisibility(); // Check visibility on theme change
      }
    });
    window.addEventListener('scroll', handleParticleVisibility);
    window.addEventListener('resize', handleParticleVisibility); // Handle resize events too
    // --- INITIAL PAGE LOAD ---
    updateThemeIcon();
    loadParticlesTheme();
    handleParticleVisibility(); // Initial check
  </script>

</body>

</html>
