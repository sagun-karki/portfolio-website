<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sagun Karki{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon/favicon.ico') }}">
  
  <!-- Preconnect to external domains for faster resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  
  <!-- Preload critical fonts -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  
  <!-- Critical CSS inlined for faster initial render -->
  <style>
    :root{--color-bg:#F5F5F5;--color-surface:#FFFFFF;--color-text:#1A1A19;--color-text-muted:#555555;--color-primary:#E67E22;--color-border:#E0E0E0;--color-nav-bg:rgba(255,255,255,0.94);--font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--header-height:65px;--radius-pill:999px}
    .dark-theme{--color-bg:#1A1A19;--color-surface:#242423;--color-text:#E0E0E0;--color-text-muted:#A0A0A0;--color-border:#333332;--color-nav-bg:rgba(36,36,35,0.94)}
    *,*::before,*::after{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:var(--font-sans);background-color:var(--color-bg);color:var(--color-text);line-height:1.65;display:flex;flex-direction:column;min-height:100vh}
    .main-header{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:1000}
    .main-nav{display:flex;align-items:center;justify-content:center;padding:0.5rem 1.25rem;border-radius:var(--radius-pill)}
    .nav-links{display:flex;gap:0.5rem;position:relative}
    .nav-links a{text-decoration:none;color:var(--color-text-muted);font-weight:500;font-size:0.8rem;padding:0.5rem 1.15rem;border-radius:var(--radius-pill);transition:color 0.2s}
    .theme-toggle{color:var(--color-text-muted);cursor:pointer}
    md-icon-button{--md-icon-button-icon-color:var(--color-text)}
    .dark-theme md-icon-button{--md-icon-button-icon-color:var(--color-text)}
    /* Disable transitions initially to prevent flash */
    body{transition:none!important}
    body.theme-loaded{transition:background-color 0.3s ease,color 0.3s ease}
    body.theme-loaded *{transition-timing-function:ease!important}
  </style>

  <!-- Defer non-critical scripts -->
  <script type="module" src="https://unpkg.com/@material/web/all.js?module" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" defer></script>
  
  <!-- Preload and defer main stylesheet -->
  <link rel="preload" as="style" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"></noscript>

  <script>
    // Apply theme immediately before render
    (function() {
      const theme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (theme === 'dark' || (!theme && prefersDark)) {
        document.documentElement.classList.add('dark-theme');
      }
      // Enable smooth transitions after theme is applied
      requestAnimationFrame(() => {
        document.body.classList.add('theme-loaded');
      });
    })();
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KQGJ05YPPF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-KQGJ05YPPF');
  </script>
</head>

<body>

  <svg style="display: none;">
    <symbol id="icon-linkedin" viewBox="0 0 24 24">
      <path fill="currentColor" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
    </symbol>
    <symbol id="icon-github" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
    </symbol>
  </svg>
  


  <header class="main-header">
    <nav class="main-nav">
      <a href="#" class="nav-brand">Sagun Karki</a>
      <div class="nav-links">
        <div class="nav-indicator"></div>
        <a href="#home">Home</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
        <a href="#publications">Publications</a>
      </div>
      <div class="nav-actions">
        <md-icon-button id="theme-toggle" class="theme-toggle">
          <md-icon>dark_mode</md-icon>
        </md-icon-button>
        <md-icon-button class="hamburger-button">
          <md-icon>menu</md-icon>
        </md-icon-button>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="main-footer">
    <div class="footer-content">
      <p>&copy; 2025 {{ site_data.profile.name }}. All rights reserved.</p>
      <div class="social-links">
        {% for social in site_data.profile.socials %}
        <a href="{{ social.url }}" target="_blank" aria-label="{{ social.platform }}">
          <svg><use href="{{ social.icon }}"></use></svg>
        </a>
        {% endfor %}
      </div>
    </div>
  </footer>


  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>

</body>

</html>
